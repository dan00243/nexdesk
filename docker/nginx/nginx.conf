worker_processes auto;
events { worker_connections 4096; use epoll; multi_accept on; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on; tcp_nopush on; tcp_nodelay on;
  keepalive_timeout 65; server_tokens off;

  gzip on; gzip_vary on; gzip_comp_level 6;
  gzip_types text/plain application/json application/javascript text/css;

  limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:50m;

  upstream backend   { server backend:8000;   keepalive 32; }
  upstream signaling { server signaling:7879;  keepalive 16; }

  server {
    listen 80;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl http2;
    server_name nexdesk.example.com;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 600M;
    proxy_read_timeout 300s;

    location /api/ {
      limit_req zone=api burst=50 nodelay;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /signaling/ {
      rewrite ^/signaling/(.*) /$1 break;
      proxy_pass http://signaling;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    location /health { proxy_pass http://backend/health; access_log off; }
    location ~ /\. { deny all; }
  }
}
