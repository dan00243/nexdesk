version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexdesk}
      POSTGRES_DB:       ${POSTGRES_DB:-nexdesk}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER:-nexdesk}:${POSTGRES_PASSWORD:-nexdesk}@postgres:5432/${POSTGRES_DB:-nexdesk}
      REDIS_URL:      redis://redis:6379/0
      JWT_SECRET:     ${JWT_SECRET:-changeme_generate_with_secrets_token_hex_64}
      SIGNALING_URL:  http://signaling:7879
      SIGNALING_SECRET: ${SIGNALING_SECRET:-changeme}
      DEBUG:          ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  signaling:
    build:
      context: ./signaling
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL:          http://backend:8000
      SIGNALING_PORT:   7879
      SIGNALING_SECRET: ${SIGNALING_SECRET:-changeme}
    ports:
      - "7879:7879"
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7879/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - signaling

volumes:
  pg_data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
